version: '3'

tasks:
  all:
    desc: Start Neo4j and setup the graph
    cmds:
      - task: up
      - task: setup

  up:
    desc: Start Neo4j
    cmds:
      - docker-compose up -d
    status:
      - docker ps | grep neo4j-terraform-db

  logs:
    desc: Stream logs from docker-compose
    cmds:
      - docker-compose logs -f

  setup:
    desc: Fetch schemas and populate the graph
    cmds:
      - mkdir -p .cache .tmp
      - task: fetch
      - task: populate

  fetch:
    desc: Fetch Terraform schemas
    cmds:
      - uv run scripts/fetch_schemas.py

  populate:
    desc: Populate Neo4j graph
    cmds:
      - uv run scripts/populate_graph.py

  examples:
    desc: Run example Cypher queries
    cmds:
      - uv run scripts/run_query.py examples/queries.cql

  down:
    desc: Stop Neo4j
    cmds:
      - docker-compose down

  clean:
    desc: Clean local cache and schema files
    cmds:
      - rm -rf .cache
      - rm -rf data/neo4j/*
    prompt: This will delete all local data and the Neo4j volume. Continue?

  test:
    desc: Run pytest
    cmds:
      - PYTHONPATH=. uv run pytest

  test:cov:
    desc: Run pytest with coverage reporting
    cmds:
      - PYTHONPATH=. uv run pytest --cov=scripts --cov-report=term-missing

  lint:
    desc: Run ruff linting
    cmds:
      - uv run ruff check scripts tests --fix
      - uv run ruff format scripts tests --check

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format scripts tests
      - uv run ruff check scripts tests --fix
